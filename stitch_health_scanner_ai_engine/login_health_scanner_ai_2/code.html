<script>
        // Jellyfish Animation logic
        const canvas = document.getElementById('jellyfish-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let jellyfishArray = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Jellyfish {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 200 + 100;
                this.radius = Math.random() * 15 + 20;
                this.speed = Math.random() * 0.5 + 0.2;
                this.color = `rgba(0, 240, 255, ${Math.random() * 0.4 + 0.2})`;
                this.angle = 0;
                this.tentacles = [];
                const tentacleCount = 8 + Math.floor(Math.random() * 5);
                for(let i = 0; i < tentacleCount; i++) {
                    this.tentacles.push({
                        phase: Math.random() * Math.PI * 2,
                        offset: (i / tentacleCount) * Math.PI * 2
                    });
                }
            }

            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y * 0.01) * 0.5;
                this.angle += 0.05;

                if (this.y < -200) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw Body
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, Math.PI, 0);
                ctx.lineTo(this.radius, this.radius * 0.3);
                ctx.quadraticCurveTo(0, this.radius * 0.6, -this.radius, this.radius * 0.3);
                ctx.closePath();
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00F0FF';
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Draw Tentacles
                this.tentacles.forEach((t, i) => {
                    ctx.beginPath();
                    ctx.moveTo((i - this.tentacles.length/2) * (this.radius * 0.2), this.radius * 0.3);
                    
                    let tx = (i - this.tentacles.length/2) * (this.radius * 0.2);
                    let ty = this.radius * 0.3;
                    
                    for(let segment = 0; segment < 15; segment++) {
                        const wave = Math.sin(this.angle + segment * 0.3 + t.phase) * 3;
                        ty += 5;
                        tx += wave;
                        ctx.lineTo(tx, ty);
                    }
                    
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });
                
                ctx.restore();
            }
        }

        function initJellyfish() {
            jellyfishArray = [];
            const count = Math.floor((width * height) / 40000) + 5;
            for(let i = 0; i < count; i++) {
                jellyfishArray.push(new Jellyfish());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 11, 20, 0.15)'; // Trail effect
            ctx.fillRect(0, 0, width, height);
            
            jellyfishArray.forEach(j => {
                j.update();
                j.draw();
            });
            
            requestAnimationFrame(animate);
        }

        initJellyfish();
        animate();

        // Parallax / Floating UI interaction
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            const loginBox = document.getElementById('login-container');
            const logo = document.getElementById('logo-container');
            
            if (loginBox) {
                loginBox.style.transform = `translate(${x}px, ${y}px)`;
            }
            if (logo) {
                logo.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
            }
        });

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.innerText = 'dark_mode';
            } else {
                html.classList.add('dark');
                themeIcon.innerText = 'light_mode';
            }
        });

        // Micro-interaction for form inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.parentElement.parentElement.querySelector('label');
                if (label) label.style.color = '#00F0FF';
            });
            input.addEventListener('blur', () => {
                const label = input.parentElement.parentElement.querySelector('label');
                if (label) label.style.color = '';
            });
        });
    </script>
