<script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.innerText = 'dark_mode';
                // Adjust glass panels for light mode visibility if needed via script or utility classes
            } else {
                html.classList.add('dark');
                themeIcon.innerText = 'light_mode';
            }
        });

        // Floating particles or subtle movement interaction
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const bgImage = document.querySelector('.jellyfish-bg img');
            if (bgImage) {
                bgImage.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Micro-interaction for form inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '#00F0FF';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
